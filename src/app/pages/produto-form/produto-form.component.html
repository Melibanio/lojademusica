<div class="content-container">
  <div class="form-card">
    <div class="form-header">
      <h1>{{ titulo }}</h1>
    </div>

    @if (mensagem) {
      <div class="mensagem" [class.sucesso]="mensagemTipo === 'sucesso'" [class.erro]="mensagemTipo === 'erro'">
        {{ mensagem }}
      </div>
    }

    <div class="form-group">
      <label for="input-nome">Nome do Produto *</label>
      <input
        class="input-simples"
        id="input-nome"
        name="nome"
        [(ngModel)]="produto.nome"
        placeholder="Digite o nome do produto"
        type="text"
      />
    </div>

    <div class="form-group">
      <label for="input-categoria">Categoria *</label>
      <select
        class="input-simples"
        id="input-categoria"
        name="categoria"
        [(ngModel)]="produto.categoria"
      >
        <option value="">Selecione uma categoria</option>
        @for (cat of categorias; track cat) {
          <option [value]="cat">{{ cat }}</option>
        }
      </select>
    </div>

    <div class="form-group">
      <label for="input-preco">Preço (R$) *</label>
      <input
        class="input-simples"
        id="input-preco"
        name="preco"
        [(ngModel)]="produto.preco"
        placeholder="0.00"
        type="number"
        min="0"
        step="0.01"
      />
    </div>

    <div class="form-group">
      <label for="input-estoque">Quantidade em Estoque</label>
      <input
        class="input-simples"
        id="input-estoque"
        name="estoque"
        [(ngModel)]="produto.estoque"
        placeholder="0"
        type="number"
        min="0"
      />
    </div>

    <div class="form-actions">
      <button class="btn-cancelar" routerLink="/produtos">Cancelar</button>
      <button class="btn-salvar" (click)="salvar()">
        {{ modoEdicao ? 'Atualizar' : 'Cadastrar' }}
      </button>
    </div>
  </div>
</div>
